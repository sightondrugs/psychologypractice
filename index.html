<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AP Psychology Training</title>

<style>
*{
  box-sizing:border-box;
}

:root{
  --mx:0;
  --my:0;
  --tiltX:0deg;
  --tiltY:0deg;
}

html,
body{
  width:100%;
  min-height:100%;
}

body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  display:grid;
  place-items:center;
  color:#f8fafc;
  background:#030411;
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* full page universe */
.scene{
  position:fixed;
  inset:0;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(21,32,78,.72), transparent 36rem),
    radial-gradient(circle at 18% 22%, rgba(83,65,184,.22), transparent 24rem),
    radial-gradient(circle at 78% 72%, rgba(21,132,180,.16), transparent 28rem),
    linear-gradient(180deg,#050716 0%, #02030b 64%, #000 100%);
  perspective:1000px;
}

/* subtle cursor lighting */
.scene::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(
    circle at calc(50% + (var(--mx) * 1px)) calc(50% + (var(--my) * 1px)),
    rgba(150,190,255,.13),
    rgba(145,96,255,.05) 18rem,
    transparent 34rem
  );
  pointer-events:none;
  mix-blend-mode:screen;
}

/* randomized animated canvas starfield */
#starCanvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
  opacity:.95;
}

/* brain-shaped galaxy made from layered cartoon-like glowing lobes */
.brain-wrap{
  position:absolute;
  left:50%;
  top:43%;
  width:min(76vw,1050px);
  aspect-ratio:1.55/1;
  transform:
    translate(-50%,-50%)
    rotateX(var(--tiltY))
    rotateY(var(--tiltX))
    translate3d(calc(var(--mx) * -0.018px), calc(var(--my) * -0.018px), 0);
  transform-style:preserve-3d;
  filter:drop-shadow(0 0 20px rgba(86,139,255,.28));
  animation:brainFloat 8s ease-in-out infinite alternate;
  pointer-events:none;
}

.brain{
  position:absolute;
  inset:0;
  opacity:.96;
  filter:saturate(1.22) contrast(1.08);
}

.brain::before{
  content:"";
  position:absolute;
  inset:4% 1% 10% 1%;
  background:
    radial-gradient(ellipse at 34% 37%, rgba(79,145,255,.62), transparent 16%),
    radial-gradient(ellipse at 45% 25%, rgba(92,116,255,.58), transparent 16%),
    radial-gradient(ellipse at 59% 36%, rgba(181,91,255,.60), transparent 18%),
    radial-gradient(ellipse at 69% 53%, rgba(238,105,218,.46), transparent 17%),
    radial-gradient(ellipse at 49% 52%, rgba(255,220,172,.62), transparent 12%),
    radial-gradient(ellipse at 41% 60%, rgba(77,156,255,.45), transparent 18%),
    radial-gradient(ellipse at 56% 67%, rgba(169,87,255,.48), transparent 18%),
    radial-gradient(ellipse at 36% 72%, rgba(62,130,232,.36), transparent 15%);
  clip-path:path("M 138 300 C 70 236 88 144 170 103 C 194 51 270 42 315 82 C 361 28 451 35 487 92 C 544 49 638 71 662 140 C 736 149 789 219 765 295 C 827 362 785 466 696 478 C 657 543 553 551 497 499 C 438 554 331 545 291 476 C 214 493 135 432 139 350 C 108 342 106 316 138 300 Z");
  transform:scale(1.18) translate(-7%, -1%);
  filter:blur(.2px);
}

/* outline glow */
.brain::after{
  content:"";
  position:absolute;
  inset:4% 1% 10% 1%;
  border:1px solid rgba(155,189,255,.35);
  clip-path:path("M 138 300 C 70 236 88 144 170 103 C 194 51 270 42 315 82 C 361 28 451 35 487 92 C 544 49 638 71 662 140 C 736 149 789 219 765 295 C 827 362 785 466 696 478 C 657 543 553 551 497 499 C 438 554 331 545 291 476 C 214 493 135 432 139 350 C 108 342 106 316 138 300 Z");
  transform:scale(1.18) translate(-7%, -1%);
  box-shadow:inset 0 0 45px rgba(87,139,255,.25), 0 0 24px rgba(106,140,255,.25);
}

/* cartoon star dust clipped into brain shape */
.brain-stars{
  position:absolute;
  inset:4% 1% 10% 1%;
  clip-path:path("M 138 300 C 70 236 88 144 170 103 C 194 51 270 42 315 82 C 361 28 451 35 487 92 C 544 49 638 71 662 140 C 736 149 789 219 765 295 C 827 362 785 466 696 478 C 657 543 553 551 497 499 C 438 554 331 545 291 476 C 214 493 135 432 139 350 C 108 342 106 316 138 300 Z");
  transform:scale(1.18) translate(-7%, -1%);
  background:
    radial-gradient(circle at 49% 48%, rgba(255,239,196,.95) 0 2px, transparent 4px),
    radial-gradient(circle at 26% 39%, rgba(255,255,255,.9) 0 1.4px, transparent 3px),
    radial-gradient(circle at 37% 27%, rgba(176,205,255,.9) 0 1.2px, transparent 3px),
    radial-gradient(circle at 63% 32%, rgba(255,190,245,.9) 0 1.3px, transparent 3px),
    radial-gradient(circle at 69% 60%, rgba(255,255,255,.86) 0 1.2px, transparent 3px),
    radial-gradient(circle at 42% 68%, rgba(177,211,255,.86) 0 1.2px, transparent 3px),
    radial-gradient(circle at 54% 53%, rgba(255,255,255,.9) 0 1.1px, transparent 3px),
    radial-gradient(circle at 58% 72%, rgba(255,170,240,.82) 0 1.1px, transparent 3px),
    repeating-radial-gradient(ellipse at 50% 50%, transparent 0 22px, rgba(190,205,255,.085) 23px 25px, transparent 27px 44px);
  filter:drop-shadow(0 0 6px rgba(255,255,255,.45));
  animation:brainStars 5s ease-in-out infinite alternate;
}

/* soft gyri lines inside brain */
.gyri{
  position:absolute;
  inset:4% 1% 10% 1%;
  clip-path:path("M 138 300 C 70 236 88 144 170 103 C 194 51 270 42 315 82 C 361 28 451 35 487 92 C 544 49 638 71 662 140 C 736 149 789 219 765 295 C 827 362 785 466 696 478 C 657 543 553 551 497 499 C 438 554 331 545 291 476 C 214 493 135 432 139 350 C 108 342 106 316 138 300 Z");
  transform:scale(1.18) translate(-7%, -1%);
  background:
    radial-gradient(ellipse at 31% 31%, transparent 0 25%, rgba(119,180,255,.30) 26% 27%, transparent 29%),
    radial-gradient(ellipse at 44% 40%, transparent 0 28%, rgba(159,135,255,.30) 29% 30%, transparent 33%),
    radial-gradient(ellipse at 61% 43%, transparent 0 27%, rgba(255,154,230,.28) 28% 29%, transparent 32%),
    radial-gradient(ellipse at 46% 63%, transparent 0 25%, rgba(95,173,255,.22) 26% 27%, transparent 30%),
    radial-gradient(ellipse at 67% 65%, transparent 0 24%, rgba(216,134,255,.24) 25% 26%, transparent 29%);
  mix-blend-mode:screen;
  opacity:.9;
}

/* small brain stem */
.stem{
  position:absolute;
  left:43.5%;
  top:69%;
  width:13%;
  height:30%;
  background:linear-gradient(180deg, rgba(105,155,255,.48), rgba(177,93,255,.22), transparent 88%);
  clip-path:polygon(35% 0, 68% 0, 76% 72%, 54% 100%, 34% 72%);
  filter:blur(.3px) drop-shadow(0 0 14px rgba(106,148,255,.25));
  opacity:.7;
}

/* foreground interface inspired by cinematic sci-fi frames */
.topbar{
  position:fixed;
  top:26px;
  left:30px;
  right:30px;
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  pointer-events:none;
}

.brand,
.hint,
.corner-btn,
.footer-note{
  font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  letter-spacing:.18em;
  text-transform:uppercase;
  font-size:12px;
  color:rgba(235,242,255,.78);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 17px;
  border:1px solid rgba(175,194,255,.18);
  border-radius:18px;
  background:rgba(3,6,18,.42);
  backdrop-filter:blur(14px);
}

.brand svg{
  width:26px;
  height:26px;
  opacity:.92;
}

.hint{
  opacity:.62;
}

.corner-btn{
  display:grid;
  place-items:center;
  width:48px;
  height:48px;
  border:1px solid rgba(175,194,255,.18);
  border-radius:16px;
  background:rgba(3,6,18,.42);
  backdrop-filter:blur(14px);
}

main{
  position:relative;
  z-index:3;
  width:min(92vw,1000px);
  text-align:center;
  transform:translate3d(calc(var(--mx) * .012px), calc(var(--my) * .012px),0);
}

h1{
  margin:170px 0 15px;
  font-size:clamp(42px,5.4vw,82px);
  line-height:.95;
  letter-spacing:.16em;
  font-weight:800;
  text-transform:uppercase;
  text-shadow:0 0 22px rgba(255,255,255,.24), 0 5px 32px rgba(0,0,0,.65);
}

.tagline{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:22px;
  margin-bottom:34px;
  color:rgba(221,230,255,.62);
  font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  letter-spacing:.34em;
  text-transform:uppercase;
  font-size:14px;
}

.tagline::before,
.tagline::after{
  content:"";
  width:120px;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(205,218,255,.28));
}

.tagline::after{
  background:linear-gradient(90deg, rgba(205,218,255,.28), transparent);
}

.buttons{
  display:grid;
  grid-template-columns:repeat(3, minmax(190px, 1fr));
  gap:18px;
  max-width:860px;
  margin:0 auto;
}

a{
  position:relative;
  overflow:hidden;
  min-height:68px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:0 22px;
  color:#f8fbff;
  text-decoration:none;
  border:1px solid rgba(190,204,255,.23);
  border-radius:18px;
  background:rgba(4,8,22,.54);
  backdrop-filter:blur(16px);
  font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  text-transform:uppercase;
  letter-spacing:.14em;
  font-size:14px;
  box-shadow:inset 0 0 24px rgba(255,255,255,.025), 0 14px 40px rgba(0,0,0,.30);
  transition:transform .22s ease, border-color .22s ease, background .22s ease;
}

a::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.14), transparent);
  transform:translateX(-120%);
  transition:.55s ease;
}

a:hover{
  transform:translateY(-4px);
  border-color:rgba(208,221,255,.46);
  background:rgba(9,15,35,.68);
}

a:hover::before{
  transform:translateX(120%);
}

.start{
  border-color:rgba(145,179,255,.72);
  background:linear-gradient(135deg, rgba(55,102,255,.82), rgba(117,73,224,.70));
  box-shadow:0 0 0 1px rgba(255,255,255,.08) inset, 0 16px 38px rgba(43,85,255,.22);
}

.icon{
  width:21px;
  height:21px;
  opacity:.95;
}

.footer-left,
.footer-center,
.footer-right{
  position:fixed;
  bottom:28px;
  z-index:4;
  color:rgba(211,222,255,.56);
  font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  letter-spacing:.16em;
  text-transform:uppercase;
  font-size:12px;
}

.footer-left{left:32px}
.footer-center{left:50%;transform:translateX(-50%);opacity:.72}
.footer-right{right:32px}

@keyframes spaceDrift{
  from{transform:translate3d(0,0,0)}
  to{transform:translate3d(-180px,-260px,0)}
}

@keyframes spaceDriftReverse{
  from{transform:translate3d(0,0,0)}
  to{transform:translate3d(200px,280px,0)}
}

@keyframes twinkle{
  from{opacity:.18}
  to{opacity:.44}
}

@keyframes brainFloat{
  from{margin-top:-8px}
  to{margin-top:10px}
}

@keyframes brainStars{
  from{opacity:.65; filter:drop-shadow(0 0 5px rgba(255,255,255,.35))}
  to{opacity:.95; filter:drop-shadow(0 0 9px rgba(255,255,255,.55))}
}

@media(max-width:850px){
  .topbar{
    left:16px;
    right:16px;
    top:16px;
  }

  .hint{
    display:none;
  }

  .brain-wrap{
    width:120vw;
    top:39%;
  }

  h1{
    margin-top:130px;
    font-size:clamp(36px,10vw,58px);
    letter-spacing:.10em;
  }

  .tagline{
    font-size:12px;
    letter-spacing:.20em;
  }

  .tagline::before,
  .tagline::after{
    width:48px;
  }

  .buttons{
    grid-template-columns:1fr;
    max-width:360px;
    gap:12px;
  }

  .footer-left,
  .footer-right{
    display:none;
  }

  .footer-center{
    width:100%;
    text-align:center;
    bottom:16px;
    font-size:11px;
  }
}
</style>
</head>

<body>
  <div class="scene" aria-hidden="true">
    <canvas id="starCanvas"></canvas>

    <div class="brain-wrap">
      <div class="brain"></div>
      <div class="gyri"></div>
      <div class="brain-stars"></div>
      <div class="stem"></div>
    </div>
  </div>

  <header class="topbar">
    <div class="hint">← move your mouse →</div>

    <div class="corner-btn">Ψ</div>
  </header>

  <main>
    <h1>AP Psychology Training</h1>
    <div class="tagline">Practice · Review · Master</div>

    <div class="buttons">
      <a class="start" href="practice.html">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 19c5.5-.8 10.7-6 14-14-8 3.3-13.2 8.5-14 14Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M14 6l4 4M8 16l-3 3M9 11l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        Start Practicing
      </a>

      <a href="practice.html#units">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 5.5c2.8-.8 5-.3 7 1.3 2-1.6 4.2-2.1 7-1.3v13c-2.8-.8-5-.3-7 1.3-2-1.6-4.2-2.1-7-1.3v-13Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M12 6.8v13" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        Review Units
      </a>

      <a href="practice.html#bank">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 3 3.5 7.5 12 12l8.5-4.5L12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="m3.5 12 8.5 4.5L20.5 12M3.5 16.5 12 21l8.5-4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Question Bank
      </a>
    </div>
  </main>

  <div class="footer-left">Focus · Learn · Excel</div>
  <div class="footer-center">Move your mouse to explore</div>
  <div class="footer-right">You’ve got this ✦</div>

<script>
const root = document.documentElement;
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];
let dpr = Math.min(window.devicePixelRatio || 1, 2);

function resizeStars(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  createStars();
}

function createStars(){
  const count = Math.floor((window.innerWidth * window.innerHeight) / 5200);
  stars = Array.from({length: count}, () => {
    const warm = Math.random() > .78;
    const blue = Math.random() > .55;
    return {
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.55 + .25,
      base: Math.random() * .55 + .22,
      tw: Math.random() * Math.PI * 2,
      speed: Math.random() * .018 + .004,
      drift: Math.random() * .18 + .04,
      layer: Math.random() * .85 + .15,
      color: warm ? '255,220,190' : blue ? '165,195,255' : '255,255,255'
    };
  });
}

function drawStars(){
  ctx.clearRect(0,0,window.innerWidth,window.innerHeight);

  for(const s of stars){
    s.tw += s.speed;
    s.y += s.drift * s.layer;
    if(s.y > window.innerHeight + 8){
      s.y = -8;
      s.x = Math.random() * window.innerWidth;
    }

    const parX = currentX * .006 * s.layer;
    const parY = currentY * .006 * s.layer;
    const alpha = Math.max(.12, Math.min(.95, s.base + Math.sin(s.tw) * .25));
    const x = s.x + parX;
    const y = s.y + parY;

    ctx.beginPath();
    ctx.fillStyle = `rgba(${s.color},${alpha})`;
    ctx.arc(x, y, s.r, 0, Math.PI * 2);
    ctx.fill();

    if(s.r > 1.25 && alpha > .55){
      ctx.beginPath();
      ctx.strokeStyle = `rgba(${s.color},${alpha * .22})`;
      ctx.lineWidth = .7;
      ctx.moveTo(x - s.r * 4, y);
      ctx.lineTo(x + s.r * 4, y);
      ctx.moveTo(x, y - s.r * 4);
      ctx.lineTo(x, y + s.r * 4);
      ctx.stroke();
    }
  }
}

let targetX = 0;
let targetY = 0;
let currentX = 0;
let currentY = 0;

function setPointer(x, y){
  const halfW = window.innerWidth / 2;
  const halfH = window.innerHeight / 2;
  targetX = x - halfW;
  targetY = y - halfH;
}

window.addEventListener('pointermove', (e) => setPointer(e.clientX, e.clientY));

window.addEventListener('deviceorientation', (e) => {
  if(window.innerWidth > 850) return;
  targetX = (e.gamma || 0) * 10;
  targetY = (e.beta || 0) * 5;
});

function animate(){
  currentX += (targetX - currentX) * 0.065;
  currentY += (targetY - currentY) * 0.065;

  root.style.setProperty('--mx', currentX.toFixed(2));
  root.style.setProperty('--my', currentY.toFixed(2));
  root.style.setProperty('--tiltX', (currentX / window.innerWidth * 8).toFixed(2) + 'deg');
  root.style.setProperty('--tiltY', (-currentY / window.innerHeight * 8).toFixed(2) + 'deg');

  drawStars();
  requestAnimationFrame(animate);
}

resizeStars();
window.addEventListener('resize', resizeStars);
animate();
</script>
</body>
