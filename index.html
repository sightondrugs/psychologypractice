<!DOCTYPE html>
<html lang="en">
<head>

  <title>AP Psychology • EDEN-XANDER OnePrep</title>

  <style>
    :root {
      --bg: #071827; --panel: #0e2538; --panel-2: #132f45; --text: #eef8ff;
      --muted: #9fb6c8; --accent: #00d4ff; --accent-2: #8df3ff;
      --success: #25e68a; --danger: #ff4d6d; --border: rgba(255,255,255,.11);
      --shadow: 0 18px 60px rgba(0, 212, 255, .12);
    }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; color:var(--text); font-family:Inter,system-ui,sans-serif;
      background: radial-gradient(circle at top left, rgba(0,212,255,.22), transparent 32rem),
                  radial-gradient(circle at bottom right, rgba(141,243,255,.12), transparent 30rem),
                  var(--bg); }
    .site-header { position:sticky; top:0; z-index:50; border-bottom:1px solid var(--border); background:rgba(7,24,39,.78); backdrop-filter:blur(16px); }
    .header-inner { max-width:1180px; margin:0 auto; padding:1rem; display:flex; align-items:center; justify-content:space-between; }
    .logo { width:42px; height:42px; background:linear-gradient(135deg,#00d4ff,#fff); color:#00111c; font-weight:900; border-radius:14px; display:grid; place-items:center; box-shadow:0 0 35px rgba(0,212,255,.4); }
    .card { background:linear-gradient(180deg,rgba(19,47,69,.92),rgba(14,37,56,.92)); border:1px solid var(--border); border-radius:24px; box-shadow:var(--shadow); padding:1.25rem; }
    .tab { border:1px solid var(--border); color:var(--text); background:rgba(19,47,69,.8); border-radius:16px; padding:.9rem .75rem; cursor:pointer; font-weight:700; }
    .tab.active { background:var(--accent); color:#00111c; border-color:transparent; }
    .option { background:rgba(255,255,255,.06); border:1px solid var(--border); border-radius:16px; padding:.95rem 1rem; cursor:pointer; transition:.18s; }
    .option:hover { background:rgba(0,212,255,.12); border-color:rgba(0,212,255,.45); }
    .option.correct { background:rgba(37,230,138,.16); border-color:var(--success); }
    .option.wrong { background:rgba(255,77,109,.14); border-color:var(--danger); }
    .question-image { max-width:100%; border-radius:16px; border:1px solid var(--border); margin:1rem 0; }
    button.btn { border:0; border-radius:14px; padding:.9rem 1rem; font-weight:900; background:var(--accent); color:#00111c; cursor:pointer; }
    .btn.secondary { background:rgba(255,255,255,.08); color:var(--text); border:1px solid var(--border); }
  </style>
</head>
<body>

      <button class="tab" onclick="showTab(1)">Topic Review</button>
      <button class="tab" onclick="showTab(2)">Question Bank</button>

</body>
</html>
